# Hakimi Studio desktop packaging (cloud matrix).
# Headless binary on all OS; GUI + installers on hosts with WebKit 4.1 / WebView2 / WKWebView.
#
# Release rule: ONLY ship installers + packaged archives.
# Never upload Tauri bundle internals (.so, gschema.xml, WebKit helpers, etc.).

name: Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches: [main, master]
    paths:
      - "crates/hakimi-desktop/**"
      - "crates/hakimi-studio-api/**"
      - "crates/hakimi-workspace/**"
      - "crates/hakimi-server/**"
      - "crates/hakimi-webui/static/**"
      - "hakimi-webui/**"
      - "docs/hakimi-studio/DESKTOP.md"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "crates/hakimi-desktop/**"
      - "crates/hakimi-studio-api/**"
      - "crates/hakimi-workspace/**"
      - "crates/hakimi-server/**"
      - "crates/hakimi-webui/static/**"
      - ".github/workflows/desktop.yml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Always-green: headless Studio backend binary (no WebKit / no Tauri)
  # ---------------------------------------------------------------------------
  headless:
    name: Headless (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: hakimi-desktop-x86_64-unknown-linux-gnu
            bin: hakimi-desktop
          - os: windows-latest
            artifact: hakimi-desktop-x86_64-pc-windows-msvc
            bin: hakimi-desktop.exe
          - os: macos-latest
            artifact: hakimi-desktop-aarch64-apple-darwin
            bin: hakimi-desktop

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: desktop-headless-${{ matrix.os }}

      - name: Build headless desktop
        run: cargo build -p hakimi-desktop --release

      - name: Smoke --once
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/${{ matrix.bin }} --once

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" dist/
          cp crates/hakimi-desktop/README.md dist/ 2>/dev/null || true
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../${{ matrix.artifact }}.zip" ./*
          else
            tar czf "../${{ matrix.artifact }}.tar.gz" ./*
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # GUI feature + native installers (WebKit 4.1 / system webview)
  # ---------------------------------------------------------------------------
  gui:
    name: GUI pack (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: hakimi-studio-linux-x86_64
          - os: windows-latest
            artifact: hakimi-studio-windows-x86_64
          - os: macos-latest
            artifact: hakimi-studio-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: desktop-gui-${{ matrix.os }}

      - name: Install Linux WebKit / bundler deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Prefer ayatana (conflicts with classic libappindicator3 on Ubuntu 22.04+)
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            file

      - name: Setup Node (for prebuilt tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install @tauri-apps/cli
        # cargo install tauri-cli on nightly fails (rustix / rustc_attrs); use npm binary
        run: npm install -g @tauri-apps/cli@2

      - name: Build GUI binary
        run: cargo build -p hakimi-desktop --release --features gui

      - name: Tauri bundle
        working-directory: crates/hakimi-desktop
        shell: bash
        # Prefer npm CLI binary (works on Windows runners too with bash shell).
        # AppImage is intentionally disabled (linuxdeploy flaky + dumps junk into
        # release if mis-collected). Targets: deb / msi / dmg only.
        # continue-on-error: WiX download / platform quirks should not kill the
        # whole matrix — we still ship headless archives + any installers found.
        continue-on-error: true
        run: |
          set -euo pipefail
          if command -v tauri >/dev/null 2>&1; then
            tauri build --features gui
          else
            npx --yes @tauri-apps/cli@2 build --features gui
          fi

      - name: Collect release-ready installers only
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          # Prefer workspace target; fall back to crate-local.
          # NEVER copy the whole bundle tree — that dumps .so / gschema / helpers.
          for root in target/release crates/hakimi-desktop/target/release; do
            if [ -d "$root/bundle" ]; then
              find "$root/bundle" -type f \( \
                -name '*.deb' -o -name '*.AppImage' -o -name '*.msi' \
                -o -name '*.dmg' -o -name '*.rpm' -o -name '*.exe' \
              \) -print0 2>/dev/null | while IFS= read -r -d '' f; do
                base="$(basename "$f")"
                # Normalize spaces → dots for stable release asset names
                safe="$(echo "$base" | tr ' ' '.')"
                cp -f "$f" "out/$safe"
                echo "collected installer: $safe"
              done
            fi
          done
          # Optional GUI-linked binary (rename per OS to avoid collisions)
          if [ -f target/release/hakimi-desktop.exe ]; then
            cp -f target/release/hakimi-desktop.exe "out/hakimi-desktop-gui-x86_64-pc-windows-msvc.exe"
          elif [ -f target/release/hakimi-desktop ]; then
            case "${{ matrix.os }}" in
              ubuntu-22.04)  cp -f target/release/hakimi-desktop out/hakimi-desktop-gui-x86_64-unknown-linux-gnu ;;
              macos-latest)  cp -f target/release/hakimi-desktop out/hakimi-desktop-gui-aarch64-apple-darwin ;;
            esac
          fi
          echo '--- collected ---'
          find out -type f | sort || true
          count="$(find out -type f | wc -l | tr -d ' ')"
          echo "collected files: $count"
          # At minimum the GUI binary from the previous build step should exist.
          test "$count" -gt 0

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/*
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # On tag: attach ONLY packaged desktop assets to the GitHub Release
  # ---------------------------------------------------------------------------
  release-assets:
    name: Attach release assets
    # Headless is required; GUI may partially fail (WiX CDN / AppImage) — still
    # publish whatever clean packages we have.
    if: startsWith(github.ref, 'refs/tags/v') && always() && needs.headless.result == 'success'
    needs: [headless, gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Don't fail the whole attach job if one GUI matrix cell is missing.
          merge-multiple: false

      - name: Stage release files (strict whitelist)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          # Explicit allow-list only. Reject .so / .xml / helpers / md5sums / etc.
          find artifacts -type f \( \
            -name 'hakimi-desktop-*.tar.gz' -o \
            -name 'hakimi-desktop-*.zip' -o \
            -name 'Hakimi.Studio_*.deb' -o \
            -name 'Hakimi.Studio_*.AppImage' -o \
            -name 'Hakimi.Studio_*.msi' -o \
            -name 'Hakimi.Studio_*.dmg' -o \
            -name 'Hakimi.Studio_*.rpm' -o \
            -name 'Hakimi.Studio_*.exe' -o \
            -name 'hakimi-desktop-gui-*' -o \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.msi' -o \
            -name '*.dmg' -o \
            -name '*.rpm' \
          \) -print0 2>/dev/null | while IFS= read -r -d '' f; do
            base="$(basename "$f" | tr ' ' '.')"
            # Extra safety: skip known junk patterns even if somehow matched
            case "$base" in
              *.so|*.so.*|*.xml|*.cache|md5sums|xdg-open|WebKit*|lib*|linuxdeploy*|template.*)
                echo "skip junk: $base"
                continue
                ;;
            esac
            dest="release-upload/$base"
            if [ ! -f "$dest" ]; then
              cp -f "$f" "$dest"
              echo "stage: $base"
            fi
          done
          echo '--- staged for GitHub Release ---'
          ls -la release-upload || true
          count="$(find release-upload -type f | wc -l | tr -d ' ')"
          echo "staged count: $count"
          test "$count" -gt 0
          # Fail hard if any junk slipped through
          if find release-upload -type f \( \
               -name '*.so' -o -name '*.so.*' -o -name '*.xml' -o -name 'md5sums' \
               -o -name 'lib*' -o -name 'WebKit*' -o -name 'linuxdeploy*' \
               -o -name 'loaders.cache' -o -name 'xdg-open' -o -name 'template.*' \
             \) | grep -q .; then
            echo "ERROR: junk files staged for release:" >&2
            find release-upload -type f | sort >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: release-upload/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
