name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-musl
            artifact: hakimi-x86_64-unknown-linux-musl
            ext: tar.gz
            install_deps: musl-tools
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            artifact: hakimi-x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: ubuntu-20.04
            target: aarch64-unknown-linux-gnu
            artifact: hakimi-aarch64-unknown-linux-gnu
            cross: true
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: hakimi-x86_64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hakimi-aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hakimi-x86_64-pc-windows-msvc
            ext: zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps
        if: matrix.install_deps
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.install_deps }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p hakimi-agent
          else
            cargo build --release --target ${{ matrix.target }} -p hakimi-agent
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hakimi dist/
          cp -r skills dist/
          cd dist
          tar czf ../${{ matrix.artifact }}.tar.gz hakimi skills
          cd ..
          rm -rf dist

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hakimi.exe dist/
          cp -r skills dist/
          cd dist
          7z a ../${{ matrix.artifact }}.zip hakimi.exe skills
          cd ..
          rm -rf dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish hakimi-agent to crates.io
        if: env.CRATES_TOKEN != ''
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: cargo publish --token "$CRATES_TOKEN" -p hakimi-agent
